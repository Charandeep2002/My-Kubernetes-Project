apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-springboot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-springboot-app
  template:
    metadata:
      labels:
        app: sample-springboot-app
    spec:
      containers:
      - name: test-app
        image: charandeep707/testapp
        ports:
        - containerPort: 80
